name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    # 每天凌晨2点运行测试
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install pdfplumber pandas numpy requests beautifulsoup4 lxml Pillow pytesseract
    
    - name: Install Tesseract OCR
      run: |
        sudo apt-get update
        sudo apt-get install -y tesseract-ocr tesseract-ocr-chi-sim
    
    - name: Run regression tests
      run: |
        cd /mnt/f/ai_fin_proj/peri_rept_down
        python tests/test_regression.py

    - name: Run expansion tests
      run: |
        cd /mnt/f/ai_fin_proj/peri_rept_down
        python tests/test_expansion.py --no-report || true
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: results.xml

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install ruff
      run: pip install ruff
    
    - name: Lint code
      run: |
        ruff check . --output-format=github

  quality-check:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install pdfplumber pandas numpy
    
    - name: Run quality checks
      run: |
        python tests/quick_verify.py
