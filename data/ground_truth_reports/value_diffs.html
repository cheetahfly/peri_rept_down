<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8">
<title>值差异分析</title>
<style>
body{font-family:'Segoe UI',Arial,sans-serif;margin:30px;background:#f5f5f5;color:#333}
h1{font-size:22px}
table{border-collapse:collapse;width:100%;background:white;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.08);margin:20px 0}
th{background:#e65100;color:white;padding:10px 14px;text-align:left}
td{padding:10px 14px;border-bottom:1px solid #eee}
tr:hover{background:#fff3e0}
.code{font-family:'Consolas',monospace;color:#1565c0}
.num{font-family:'Consolas',monospace;text-align:right}
.diff{color:#e65100;font-weight:bold}
.stats{display:flex;gap:16px;margin:20px 0}
.card{background:white;border-radius:8px;padding:16px 24px;box-shadow:0 1px 4px rgba(0,0,0,0.08);flex:1;text-align:center}
.card .big{font-size:30px;font-weight:bold}
.green{color:#2e7d32}
.amber{color:#e65100}
.summary{background:white;border-radius:8px;padding:16px 24px;box-shadow:0 1px 4px rgba(0,0,0,0.08);margin:20px 0}
</style></head><body>
<h1>600519 2020 — 值差异（误差 &ge; 1%）</h1>
<div class="stats">
<div class="card"><div class="big green">99.7%</div><div style="font-size:13px;color:#666">综合值准确率</div></div>
<div class="card"><div class="big amber">1</div><div style="font-size:13px;color:#666">值差异项</div></div>
</div>
<table><tr><th>报表</th><th>代码</th><th>科目</th><th>RDS值</th><th>提取值</th><th>误差</th><th>匹配</th></tr><tr>
<td>现金流量表</td><td class="code">F013N</td>
<td>支付其他与经营活动有关的现金</td>
<td class="num">4,247,026,186.46</td>
<td class="num">4,047,026,186.46</td>
<td class="num diff">4.71%</td>
<td>exact</td>
</tr></table>
<div class="summary"><h3>说明</h3>
<p>现金流量表 F013N 的 4.71% 差异是主表与附注明细的口径差异（PDF中该科目在附注中有两处不同金额），非提取错误。</p></div>
</body></html>
