# CF 直接法项目清单 — Sina CF 数据中实际存在的 RDS 字段
# 用于 comparator 精确测量：基线对比仅限于 Sina 有数据的项
#
# 生成: scripts/learn_sina_aliases.py learn_cf_direct_items
# 范围: 6 stocks × 2019-2022
#
# 间接法调节项 (Sina 完全不存在):
#   公允价值变动损失, 加:资产减值准备, 固定资产折旧/折耗/折旧,
#   无形资产摊销, 长期待摊费用摊销, 处置固定资产/无形资产/长期资产的损失,
#   固定资产报废损失, 投资损失, 递延所得税资产减少, 递延所得税负债增加,
#   存货的减少, 经营性应收项目的减少, 经营性应付项目的增加, 其他,
#   不涉及现金收支的重大投资和筹资活动...

cf_direct_items:
  balance_sheet: []
  income_statement: []
  cash_flow:
    # 经营活动
    - 销售商品、提供劳务收到的现金
    - 客户存款和同业存放款项净增加额
    - 向中央银行借款净增加额
    - 向其他金融机构拆入资金净增加额
    - 收取利息、手续费及佣金的现金
    - 收到其他与经营活动有关的现金
    - 经营活动现金流入小计
    - 购买商品、接受劳务支付的现金
    - 客户贷款及垫款净增加额
    - 存放中央银行和同业款项净增加额
    - 支付利息、手续费及佣金的现金
    - 支付给职工以及为职工支付的现金
    - 支付的各项税费
    - 支付其他与经营活动有关的现金
    - 经营活动现金流出小计
    - 经营活动产生的现金流量净额
    # 投资活动
    - 收回投资所收到的现金
    - 取得投资收益收到的现金
    - 处置固定资产、无形资产和其他长期资产收回的现金净额
    - 处置子公司及其他营业单位收到的现金净额
    - 收到其他与投资活动有关的现金
    - 投资活动现金流入小计
    - 购建固定资产、无形资产和其他长期资产支付的现金
    - 投资支付的现金
    - 取得子公司及其他营业单位支付的现金净额
    - 支付其他与投资活动有关的现金
    - 投资活动现金流出小计
    - 投资活动产生的现金流量净额
    # 筹资活动
    - 吸收投资收到的现金
    - 其中：子公司吸收少数股东投资收到的现金
    - 取得借款收到的现金
    - 发行债券收到的现金
    - 收到其他与筹资活动有关的现金
    - 筹资活动现金流入小计
    - 偿还债务支付的现金
    - 分配股利、利润或偿付利息支付的现金
    - 其中：子公司支付给少数股东的股利、利润
    - 支付其他与筹资活动有关的现金
    - 筹资活动现金流出小计
    - 筹资活动产生的现金流量净额
    # 汇率影响 & 现金余额
    - 汇率变动对现金及现金等价物的影响
    - 现金及现金等价物净增加额
    - 期初现金及现金等价物余额
    - 期末现金及现金等价物余额

  # IS‑cross items — RDS CF 中有但 Sina 在 IS 表中
  cf_is_cross_items:
    - 净利润
    - 财务费用
    - 信用减值损失
    - 资产减值准备
