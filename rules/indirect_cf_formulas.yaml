# 间接法现金流量项推算公式
# 用于从 Sina IS 数据推算 RDS CF 中无法直接映射的间接法调节项

formulas:
  # 资产减值 — IS 信用减值损失/资产减值损失 (CF 中加回, 转正值)
  加：资产减值准备:
    sources: ["信用减值损失", "资产减值损失"]
    op: sum
    note: "IS 减值损失合计 (CF 中加回)"

  # 公允价值变动 — IS 公允价值变动收益 (CF 取负: 损失=加回)
  公允价值变动损失:
    sources: ["公允价值变动收益/(损失)", "公允价值变动收益"]
    op: negate
    note: "IS 公允价值变动收益 negate"

  # 投资损失 — IS 投资收益 (CF 取负: 损失=加回)
  投资损失:
    sources: ["投资收益", "对联营公司的投资收益"]
    op: negate
    note: "IS 投资收益 negate"

  # 资产处置损失 — IS 资产处置收益 (CF 取负: 损失=加回)
  处置固定资产、无形资产和其他长期资产的损失:
    sources: ["资产处置收益", "非流动资产处置损失"]
    op: negate
    note: "IS 资产处置 negate"

  # 折旧/摊销 — IS 折旧费
  固定资产折旧、油气资产折耗、生产性生物资产折旧:
    sources: ["折旧费"]
    op: as_is
    note: "IS 折旧费"

  # 财务费用 (CF 中加回)
  财务费用:
    sources: ["财务费用"]
    op: as_is
    note: "IS 财务费用 (CF 中加回)"
