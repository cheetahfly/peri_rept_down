# -*- coding: utf-8 -*-
# =============================================================================
# 值映射规则 - 基于"复杂金额全等匹配"的数据源间科目名映射
#
# 原理: 当两个不同数据源的科目值精确相等（小数点后2位完全一致）时，
#       即使名称不同，也认定是同一财务科目。
#
# 本文件定义各数据源间的名称映射关系，用于跨源匹配优化。
# 每次运行自动学习后，可以将新发现的映射追加到此文件。
# =============================================================================

# 映射来源: RDS(标准化) <-> Sina(新浪财经)
# RDS名称: RDS数据库中的字段名称（如"其中：归属于母公司"）
# Sina名称: AKShare/新浪财经返回的字段名称（如"归属于母公司股东的净利润"）

sina_to_rds:
  # ===== 资产负债表 (balance_sheet) =====
  balance_sheet:
    # 前缀后缀差异
    - sina: "应收票据及应收账款"
      rds: "应收票据及应收账款"
      type: exact  # 名称完全一致
    - sina: "应收票据"
      rds: "其中：应收票据"
      type: prefix  # RDS多了"其中："

    - sina: "应收账款"
      rds: "其中：应收账款"
      type: prefix

    - sina: "应收利息"
      rds: "其中：应收利息"
      type: prefix

    - sina: "应收股利"
      rds: "其中：应收股利"
      type: prefix

    - sina: "应付票据"
      rds: "其中：应付票据"
      type: prefix

    - sina: "应付账款"
      rds: "其中：应付账款"
      type: prefix

    - sina: "应付职工薪酬"
      rds: "其中：应付职工薪酬"
      type: prefix

    - sina: "应交税费"
      rds: "其中：应交税费"
      type: prefix

    - sina: "应付利息"
      rds: "其中：应付利息"
      type: prefix

    - sina: "应付股利"
      rds: "其中：应付股利"
      type: prefix

    - sina: "应付手续费及佣金"
      rds: "其中：应付手续费及佣金"
      type: prefix

    # 合计后缀差异
    - sina: "应收票据及应收账款"
      rds: "应收票据及应收账款"
      type: exact

    - sina: "其他应收款(合计)"
      rds: "其他应收款"
      type: suffix  # Sina多了"(合计)"

    - sina: "其他应付款(合计)"
      rds: "其他应付款"
      type: suffix

    - sina: "固定资产净额"
      rds: "固定资产"
      type: alias

    - sina: "固定资产原值"
      rds: "固定资产原值"
      type: exact

    - sina: "固定资产减值准备"
      rds: "固定资产减值准备"
      type: exact

    - sina: "在建工程(合计)"
      rds: "在建工程"
      type: suffix

    - sina: "工程物资"
      rds: "工程物资"
      type: exact

    - sina: "固定资产清理"
      rds: "固定资产清理"
      type: exact

    - sina: "固定资产(合计)"
      rds: "固定资产"
      type: suffix

    - sina: "预收款项"
      rds: "预收款项"
      type: exact

    - sina: "实收资本(或股本)"
      rds: "实收资本（或股本）"
      type: alias  # 括号全半角差异

    - sina: "少数股东权益"
      rds: "少数股东权益"
      type: exact

    # 综合名差异
    - sina: "归属于母公司股东权益合计"
      rds: "归属于母公司所有者权益合计"
      type: alias  # 股东/所有者差异

    - sina: "负债和股东权益总计"
      rds: "负债和所有者权益总计"
      type: alias  # 股东/所有者差异

    - sina: "负债和所有者权益(或股东权益)总计"
      rds: "负债和所有者权益（或股东权益）总计"
      type: alias

    - sina: "资产总计"
      rds: "资产总计"
      type: exact

    # 流动资产
    - sina: "发放贷款及垫款"
      rds: "发放贷款及垫款-流动资产"
      type: suffix  # RDS有后缀"-流动资产"

    - sina: "以公允价值计量且其变动计入当期损益的金融负债(20190322废止)"
      rds: "以公允价值计量且其变动计入当期损益的金融负债"
      type: suffix  # RDS有年份标记

  # ===== 利润表 (income_statement) =====
  income_statement:
    # 去掉编号前缀
    - sina: "营业收入"
      rds: "一、营业总收入"
      type: prefix_strip  # RDS有编号前缀
    - sina: "营业收入"
      rds: "其中：营业收入"
      type: prefix
    - sina: "营业成本"
      rds: "其中：营业成本"
      type: prefix
    - sina: "营业成本"
      rds: "二、营业总成本"
      type: prefix_strip
    - sina: "税金及附加"
      rds: "税金及附加"
      type: exact

    - sina: "利息收入"
      rds: "其中：利息收入"
      type: prefix

    - sina: "利息支出"
      rds: "其中：利息支出"
      type: prefix

    - sina: "公允价值变动收益"
      rds: "加：公允价值变动收益"
      type: prefix

    - sina: "对联营企业和合营企业的投资收益"
      rds: "其中：对联营企业和合营企业的投资收益"
      type: prefix

    - sina: "营业利润"
      rds: "三、营业利润"
      type: prefix_strip
    - sina: "营业外收入"
      rds: "加：营业外收入"
      type: prefix
    - sina: "营业外支出"
      rds: "减：营业外支出"
      type: prefix
    - sina: "利润总额"
      rds: "四、利润总额"
      type: prefix_strip
    - sina: "所得税费用"
      rds: "减：所得税费用"
      type: prefix
    - sina: "净利润"
      rds: "五、净利润"
      type: prefix_strip
    - sina: "持续经营净利润"
      rds: "（一）持续经营净利润"
      type: prefix_strip
    - sina: "终止经营净利润"
      rds: "（二）终止经营净利润"
      type: prefix_strip

    # 每股收益
    - sina: "基本每股收益"
      rds: "（一）基本每股收益"
      type: prefix_strip
    - sina: "基本每股收益"
      rds: "其中：基本每股收益"
      type: prefix
    - sina: "稀释每股收益"
      rds: "（二）稀释每股收益"
      type: prefix_strip
    - sina: "稀释每股收益"
      rds: "其中：稀释每股收益"
      type: prefix

    # 综合收益
    - sina: "其他综合收益"
      rds: "七、其他综合收益"
      type: prefix_strip
    - sina: "综合收益总额"
      rds: "八、综合收益总额"
      type: prefix_strip
    - sina: "信用减值损失"
      rds: "信用减值损失（2019年格式）"
      type: suffix  # RDS有年份标记
    - sina: "资产减值损失"
      rds: "资产减值损失（2019年格式）"
      type: suffix

    # 归属
    - sina: "归属于母公司股东的净利润"
      rds: "其中：归属于母公司"
      type: alias_short  # RDS为简称
    - sina: "少数股东损益"
      rds: "其中：归属于少数股东"
      type: alias_short

  # ===== 现金流量表 (cash_flow) =====
  cash_flow:
    # 收到的/支付的其他
    - sina: "收到其他与经营活动有关的现金"
      rds: "收到的其他与经营活动有关的现金"
      type: char_diff  # "收到" vs "收到的"
    - sina: "支付其他与经营活动有关的现金"
      rds: "支付的其他与经营活动有关的现金"
      type: char_diff
    - sina: "收回投资收到的现金"
      rds: "收回投资所收到的现金"
      type: char_diff  # "收到" vs "所收到的"
    - sina: "取得投资收益收到的现金"
      rds: "取得投资收益所收到的现金"
      type: char_diff
    - sina: "处置固定资产、无形资产和其他长期资产收回的现金净额"
      rds: "处置固定资产、无形资产和其他长期资产所收回的现金净额"
      type: char_diff
    - sina: "收到其他与投资活动有关的现金"
      rds: "收到的其他与投资活动有关的现金"
      type: char_diff
    - sina: "构建固定资产、无形资产和其他长期资产支付的现金"
      rds: "购建固定资产、无形资产和其他长期资产所支付的现金"
      type: char_diff  # "构建" vs "购建", "的" vs "所"
    - sina: "投资支付的现金"
      rds: "投资所支付的现金"
      type: char_diff
    - sina: "支付其他与投资活动有关的现金"
      rds: "支付的其他与投资活动有关的现金"
      type: char_diff
    - sina: "吸收投资收到的现金"
      rds: "吸收投资所收到的现金"
      type: char_diff
    - sina: "取得借款收到的现金"
      rds: "取得借款所收到的现金"
      type: char_diff
    - sina: "偿还债务支付的现金"
      rds: "偿还债务所支付的现金"
      type: char_diff
    - sina: "分配股利、利润或偿付利息支付的现金"
      rds: "分配股利、利润或偿付利息所支付的现金"
      type: char_diff
    - sina: "支付其他与筹资活动有关的现金"
      rds: "支付的其他与筹资活动有关的现金"
      type: char_diff
    # 子公司
    - sina: "子公司吸收少数股东投资收到的现金"
      rds: "其中：子公司吸收少数股东投资收到的现金"
      type: prefix
    - sina: "子公司支付给少数股东的股利、利润"
      rds: "其中：子公司支付给少数股东的股利、利润"
      type: prefix
    # 汇率
    - sina: "汇率变动对现金及现金等价物的影响"
      rds: "四、汇率变动对现金的影响"
      type: alias
    - sina: "现金及现金等价物净增加额"
      rds: "五、现金及现金等价物净增加额"
      type: prefix_strip
    - sina: "期初现金及现金等价物余额"
      rds: "加：期初现金及现金等价物余额"
      type: prefix
    - sina: "期末现金及现金等价物余额"
      rds: "六、期末现金及现金等价物余额"
      type: prefix_strip


# =============================================================================
# 自动学习映射存储: 每次运行自动发现的映射写入此处
# 格式: [source: stock_code, year, statement_type, source_name, target_name, value]
# =============================================================================
auto_learned_mappings: []
