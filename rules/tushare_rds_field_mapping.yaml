  使用权资产折旧: use_right_asset_dep
  商誉: goodwill
  一年内到期的非流动资产: nca_within_1y
  一年内到期的非流动负债: non_cur_liab_due_1y
  长期借款: lt_borr
  减：库存股: treasury_share
  其中：应付股利: div_payable
  其中：应付票据: notes_payable
  其他应付款: oth_pay_total
  合同资产: contract_assets
  投资性房地产: invest_real_estate
  长期应付款: lt_payable
  应付债券: bond_payable
  递延收益-非流动负债: defer_inc_non_cur_liab
  财务费用: finan_exp
  销售费用: sell_exp
  利息收入: int_income
  其中：利息费用: fin_exp_int_exp
  营业外收入: non_oper_income
  资产减值损失（2019格式）: assets_impair_loss
  收取利息、手续费及佣金的现金: ifc_cash_incr
  客户存款和同业存放款项净增加额: n_depos_incr_fi
  客户贷款及垫款净增加额: n_incr_clt_loan_adv
  存放中央银行和同业款项净增加额: n_incr_dep_cbob
  支付利息、手续费及佣金的现金: pay_handling_chrg
  其中：子公司吸收少数股东投资收到的现金: incl_cash_rec_saims
  其中：子公司支付给少数股东的股利、利润: incl_dvd_profit_paid_sc_ms
  其中：对联营企业和合营企业的投资收益: ass_invest_income
