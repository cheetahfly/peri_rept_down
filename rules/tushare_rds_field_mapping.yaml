# Tushare ↔ RDS 字段映射关系（完整版）
# 建立日期：2026-06-12
# 方法：tushare 官方文档 + 5 只股票 value-based matching 验证
# 来源：https://tushare.pro/document/2?doc_id=44/45/46

# 使用说明：
#   tushare 英文字段名 → RDS 中文项目名
#   key = tushare 字段名（来自 pro API）
#   value = RDS 中文名（来自 cninfo cf_o.rds / b_o.rds / pl_o.rds）
#   source = 映射来源：doc=官方文档验证，match=value-based匹配确认

tushare_to_rds:

  # ==================== 现金流量表 (CF) ====================
  # --- 直接法 ---
  net_profit: 净利润
  c_fr_sale_sg: 销售商品、提供劳务收到的现金
  c_fr_oth_operate_a: 收到其他与经营活动有关的现金
  c_inf_fr_operate_a: 经营活动现金流入小计
  c_paid_goods_s: 购买商品、接受劳务支付的现金
  c_paid_to_for_empl: 支付给职工以及为职工支付的现金
  c_paid_for_taxes: 支付的各项税费
  oth_cash_pay_oper_act: 支付其他与经营活动有关的现金
  st_cash_out_act: 经营活动现金流出小计
  n_cashflow_act: 经营活动产生的现金流量净额
  c_disp_withdrwl_invest: 收回投资收到的现金
  c_recp_return_invest: 取得投资收益收到的现金
  n_recp_disp_fiolta: 处置固定资产、无形资产和其他长期资产收回的现金净额
  n_recp_disp_sobu: 处置子公司及其他营业单位收到的现金净额
  stot_inflows_inv_act: 投资活动现金流入小计
  c_pay_acq_const_fiolta: 购建固定资产、无形资产和其他长期资产支付的现金
  c_paid_invest: 投资支付的现金
  n_disp_subs_oth_biz: 取得子公司及其他营业单位支付的现金净额
  oth_pay_ral_inv_act: 支付其他与投资活动有关的现金
  stot_out_inv_act: 投资活动现金流出小计
  n_cashflow_inv_act: 投资活动产生的现金流量净额
  c_recp_borrow: 取得借款收到的现金
  proc_issue_bonds: 发行债券收到的现金
  c_recp_cap_contrib: 吸收投资收到的现金
  stot_cash_in_fnc_act: 筹资活动现金流入小计
  c_prepay_amt_borr: 偿还债务支付的现金
  c_pay_dist_dpcp_int_exp: 分配股利、利润或偿付利息支付的现金
  incl_dvd_profit_paid_sc_ms: 其中：子公司支付给少数股东的股利、利润
  oth_cashpay_ral_fnc_act: 支付其他与筹资活动有关的现金
  stot_cashout_fnc_act: 筹资活动现金流出小计
  n_cash_flows_fnc_act: 筹资活动产生的现金流量净额
  eff_fx_flu_cash: 四、汇率变动对现金的影响
  n_incr_cash_cash_equ: 现金及现金等价物净增加额
  c_cash_equ_beg_period: 期初现金及现金等价物余额
  c_cash_equ_end_period: 期末现金及现金等价物余额
  incl_cash_rec_saims: 其中：子公司吸收少数股东投资收到的现金
  recp_tax_rends: 收到的税费返还

  # --- 间接法调节项 ---
  uncon_invest_loss: 投资损失
  prov_depr_assets: 加：资产减值准备
  depr_fa_coga_dpba: 固定资产折旧、油气资产折耗、生产性生物资产折旧
  amort_intang_assets: 无形资产摊销
  lt_amort_deferred_exp: 长期待摊费用摊销
  decr_deferred_exp: 递延所得税资产减少
  incr_acc_exp: 递延所得税负债增加
  loss_disp_fiolta: 处置固定资产、无形资产和其他长期资产的损失
  loss_scr_fa: 固定资产报废损失
  loss_fv_chg: 公允价值变动损失
  invest_loss: 投资损失
  decr_def_inc_tax_assets: 递延所得税资产减少
  incr_def_inc_tax_liab: 递延所得税负债增加
  decr_inventories: 存货的减少
  decr_oper_payable: 经营性应收项目的减少
  incr_oper_payable: 经营性应付项目的增加
  others: 其他
  im_net_cashflow_oper_act: 经营活动产生的现金流量净额2
  conv_debt_into_cap: 可转债转股
  conv_copbonds_due_within_1y: 一年内到期可转债
  fa_fnc_leases: 融资租赁
  im_n_incr_cash_equ: 现金及现金等价物净增加额2
  net_dism_capital_add: 处置子公司及其他营业单位收到的现金净额2
  net_cash_rece_sec: 收回投资收到的现金2
  credit_impa_loss: 信用减值损失
  use_right_asset_dep: 使用权资产折旧
  oth_loss_asset: 处置固定资产、无形资产和其他长期资产的损失2
  end_bal_cash: 现金的期末余额
  beg_bal_cash: 现金的期初余额
  end_bal_cash_equ: 现金及现金等价物的期末余额
  beg_bal_cash_equ: 现金及现金等价物的期初余额

  # --- 金融类特殊字段 ---
  ifc_cash_incr: 收取利息、手续费及佣金的现金
  n_depos_incr_fi: 客户存款和同业存放款项净增加额
  n_incr_loans_cb: 向中央银行借款净增加额
  n_inc_borr_oth_fi: 向其他金融机构拆入资金净增加额
  prem_fr_orig_contr: 收取再保险业务现金净额
  n_incr_insured_dep: 吸收存款及同业存放款项净增加额
  n_reinsur_prem: 再保险业务现金净额
  n_incr_disp_tfa: 处置交易性金融资产净增加额
  ifc_cash_incr: 金融类现金流入
  n_incr_disp_faas: 处置以公允价值计量且其变动计入当期损益的金融资产净增加额
  n_incr_loans_oth_bank: 拆出资金净增加额
  n_cap_incr_repur: 回购业务资金净增加额
  n_incr_pledge_loan: 质押贷款净增加额
  stot_cash_in_fnc_act: 筹资活动现金流入小计
  free_cashflow: 自由现金流量

  # ==================== 资产负债表 (BS) ====================
  total_assets: 资产总计
  total_liab: 负债合计
  total_hldr_eqy_exc_min_int: 归母股东权益（不含少数股东权益）
  total_hldr_eqy_inc_min_int: 归母股东权益（含少数股东权益）
  money_cap: 货币资金
  accounts_receiv: 应收账款
  accounts_receiv_bill: 应收票据
  inventories: 存货
  fixed_assets: 固定资产
  intang_assets: 无形资产
  goodwill: 商誉
  lt_borr: 长期借款
  bond_payable: 应付债券
  nca_within_1y: 一年内到期的非流动资产
  non_cur_liab_due_1y: 一年内到期的非流动负债
  treasury_share: 减：库存股
  div_payable: 其中：应付股利
  notes_payable: 其中：应付票据
  oth_pay_total: 其他应付款
  contract_assets: 合同资产
  invest_real_estate: 投资性房地产
  lt_payable: 长期应付款
  defer_inc_non_cur_liab: 递延收益-非流动负债
  accounts_pay: 应付账款
  specific_payables: 其他应付款
  oth_rcv_total: 其他应收款合计
  cip_total: 在建工程合计
  fix_assets: 固定资产
  deriv_liab: 衍生金融负债
  int_payable: 应付利息
  long_pay_total: 长期应付款合计

  # ==================== 利润表 (IS) ====================
  total_revenue: 营业总收入
  revenue: 营业收入
  total_cogs: 营业总成本
  oper_cost: 营业成本
  int_exp: 利息支出
  comm_exp: 手续费及佣金支出
  biz_tax_surchg: 营业税金及附加
  sell_exp: 销售费用
  admin_exp: 管理费用
  fin_exp: 财务费用
  operate_profit: 营业利润
  non_oper_income: 营业外收入
  non_oper_exp: 营业外支出
  nca_disploss: 资产处置收益
  total_profit: 利润总额
  income_tax: 所得税费用
  n_income: 净利润
  n_income_attr_p: 归母净利润
  minority_gain: 少数股东损益
  oth_compr_income: 其他综合收益
  t_compr_income: 综合收益总额
  compr_inc_attr_p: 归母综合收益总额
  compr_inc_attr_m_s: 少数股东综合收益总额
  ebit: 息税前利润
  ebitda: 息税折旧摊销前利润
  insurance_exp: 保险赔付支出
  rd_exp: 研发费用
  fin_exp_int_exp: 其中：利息费用
  fin_exp_int_inc: 其中：利息收入
  continued_net_profit: 持续经营净利润
  assets_impair_loss: 资产减值损失
  ass_invest_income: 其中：对联营企业和合营企业的投资收益
  oth_compr_income: 其他综合收益

  # ==================== RDS → tushare 反向映射 ====================
rds_to_tushare:
  净利润: net_profit
  销售商品、提供劳务收到的现金: c_fr_sale_sg
  收到其他与经营活动有关的现金: c_fr_oth_operate_a
  经营活动现金流入小计: c_inf_fr_operate_a
  购买商品、接受劳务支付的现金: c_paid_goods_s
  支付给职工以及为职工支付的现金: c_paid_to_for_empl
  支付的各项税费: c_paid_for_taxes
  支付其他与经营活动有关的现金: oth_cash_pay_oper_act
  经营活动现金流出小计: st_cash_out_act
  经营活动产生的现金流量净额: n_cashflow_act
  投资活动产生的现金流量净额: n_cashflow_inv_act
  筹资活动产生的现金流量净额: n_cash_flows_fnc_act
  偿还债务支付的现金: c_prepay_amt_borr
  取得借款收到的现金: c_recp_borrow
  吸收投资收到的现金: c_recp_cap_contrib
  收到的税费返还: recp_tax_rends
  四、汇率变动对现金的影响: eff_fx_flu_cash
  期初现金及现金等价物余额: c_cash_equ_beg_period
  期末现金及现金等价物余额: c_cash_equ_end_period
  现金及现金等价物净增加额2: im_n_incr_cash_equ
  固定资产折旧、油气资产折耗、生产性生物资产折旧: depr_fa_coga_dpba
  无形资产摊销: amort_intang_assets
  长期待摊费用摊销: lt_amort_deferred_exp
  固定资产报废损失: loss_scr_fa
  公允价值变动损失: loss_fv_chg
  投资损失: invest_loss
  递延所得税资产减少: decr_def_inc_tax_assets
  递延所得税负债增加: incr_def_inc_tax_liab
  存货的减少: decr_inventories
  经营性应收项目的减少: decr_oper_payable
  经营性应付项目的增加: incr_oper_payable
  加：资产减值准备: prov_depr_assets
  信用减值损失: credit_impa_loss
  使用权资产折旧: use_right_asset_dep
  商誉: goodwill
  一年内到期的非流动资产: nca_within_1y
  一年内到期的非流动负债: non_cur_liab_due_1y
  长期借款: lt_borr
  减：库存股: treasury_share
  其中：应付股利: div_payable
  其中：应付票据: notes_payable
  其他应付款: oth_pay_total
  合同资产: contract_assets
  投资性房地产: invest_real_estate
  长期应付款: lt_payable
  应付债券: bond_payable
  递延收益-非流动负债: defer_inc_non_cur_liab
  财务费用: fin_exp
  销售费用: sell_exp
  利息收入: fin_exp_int_inc
  其中：利息费用: fin_exp_int_exp
  营业外收入: non_oper_income
  资产减值损失（2019格式）: assets_impair_loss
  收取利息、手续费及佣金的现金: ifc_cash_incr
  客户存款和同业存放款项净增加额: n_depos_incr_fi
  客户贷款及垫款净增加额: n_incr_clt_loan_adv
  存放中央银行和同业款项净增加额: n_incr_dep_cbob
  支付利息、手续费及佣金的现金: pay_handling_chrg
  其中：子公司吸收少数股东投资收到的现金: incl_cash_rec_saims
  其中：子公司支付给少数股东的股利、利润: incl_dvd_profit_paid_sc_ms
  其中：对联营企业和合营企业的投资收益: ass_invest_income
  收到其他与筹资活动有关的现金: oth_cash_recp_ral_fnc_act

